AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  san-lorenzo-backend — API del módulo docente.
  ASP.NET Core sobre AWS Lambda, con SQL Server en RDS y credenciales en Secrets Manager.

Parameters:
  DbSecretName:
    Type: String
    Description: Nombre (o ARN) del secreto de Secrets Manager con usuario y contraseña de la BD.
    Default: san-lorenzo/db/credentials

  JwtSecretName:
    Type: String
    Description: >
      Secreto de Secrets Manager con la clave de firma de los JWT (texto plano, mínimo
      32 bytes para HS256). Generar con: openssl rand -base64 48
    Default: san-lorenzo/jwt/signing-key

  DbHost:
    Type: String
    Description: >
      Endpoint del RDS SQL Server. Puede omitirse si el secreto ya trae el campo "host"
      (los secretos gestionados por RDS lo incluyen).
    Default: ''

  DbName:
    Type: String
    Description: Nombre de la base de datos. Puede omitirse si el secreto trae el campo "dbname".
    Default: ''

  AllowedOrigins:
    Type: CommaDelimitedList
    Description: Orígenes permitidos por CORS (el frontend Angular).
    Default: http://localhost:4200

  LogLevel:
    Type: String
    Description: Nivel de log de Powertools.
    Default: Information
    AllowedValues: [Debug, Information, Warning, Error]

Globals:
  Function:
    Runtime: dotnet10
    MemorySize: 1024
    Timeout: 29
    Architectures: ["x86_64"]
    Tracing: Active
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: san-lorenzo-backend
        POWERTOOLS_LOG_LEVEL: !Ref LogLevel
        POWERTOOLS_LOGGER_LOG_EVENT: 'false'
        POWERTOOLS_TRACE_DISABLED: 'false'
        AWS_XRAY_CONTEXT_MISSING: IGNORE_ERROR

Resources:
  SanLorenzoApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowHeaders: [Content-Type, Authorization]
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]

  SanLorenzoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: san-lorenzo-backend-api
      CodeUri: ./src/ServerlessAPI/
      Handler: ServerlessAPI
      Environment:
        Variables:
          DB_SECRET_NAME: !Ref DbSecretName
          DB_HOST: !Ref DbHost
          DB_NAME: !Ref DbName
          JWT_SECRET_NAME: !Ref JwtSecretName
          Cors__AllowedOrigins__0: !Select [0, !Ref AllowedOrigins]
          Cors__AllowedOrigins__1: !Select [1, !Ref AllowedOrigins]
      Role: arn:aws:iam::928037113213:role/LabRole
      Events:
        ProxyResource:
          Type: HttpApi
          Properties:
            ApiId: !Ref SanLorenzoApi
            Path: /{proxy+}
            Method: ANY
        RootResource:
          Type: HttpApi
          Properties:
            ApiId: !Ref SanLorenzoApi
            Path: /
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: URL base de la API del módulo docente.
    Value: !Sub 'https://${SanLorenzoApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod'

  FunctionArn:
    Description: ARN del Lambda.
    Value: !GetAtt SanLorenzoFunction.Arn
